<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>AI 建模助手</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- PapaParse for CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- SheetJS for Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Local Styles -->
    <link rel="stylesheet" href="css/main.css">
    <!-- Code Editor Styles -->
    <style>
        .code-editor-container { font-family: 'Menlo', 'Monaco', 'Courier New', monospace; background: #1e1e1e; border-radius: 12px; }
        .code-editor-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; background: #252526; border-bottom: 1px solid #333; }
        .code-editor-lang { font-size: 11px; color: #9cdcfe; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .code-editor-copy { font-size: 11px; color: #858585; background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 6px; transition: all 0.2s; }
        .code-editor-copy:hover { color: #fff; background: #3c3c3c; }
        .code-editor-body { padding: 12px 0; overflow-x: auto; }
        .code-line { display: flex; min-height: 20px; line-height: 20px; }
        .code-line-num { color: #858585; text-align: right; padding: 0 12px; user-select: none; font-size: 12px; }
        .code-line-content { color: #d4d4d4; font-size: 13px; white-space: pre; padding-right: 16px; }
        .code-keyword { color: #569cd6; font-weight: 600; }
        .code-string { color: #ce9178; }
        .code-number { color: #b5cea8; }
        .code-comment { color: #6a9955; font-style: italic; }
        .code-function { color: #dcdcaa; }
        .code-decorator { color: #4ec9b0; }
    </style>
</head>
<body class="bg-white text-gray-900 font-sans h-screen w-screen overflow-hidden selection:bg-blue-200">

    <!-- 屏幕 1：欢迎与输入界面 -->
    <div id="screen-1" class="absolute inset-0 flex flex-col items-center justify-center transition-opacity duration-500 ease-in-out z-10 bg-white">
        <div class="flex items-center gap-6 mb-12">
            <div class="relative w-24 h-24 bg-gradient-to-br from-blue-300 to-blue-500 rounded-full flex items-center justify-center shadow-sm">
                <i class="ph-fill ph-sparkle absolute -top-1 -left-2 text-blue-200 text-3xl transform rotate-12"></i>
                <div class="w-14 h-10 bg-blue-900 rounded-[20px] flex items-center justify-center relative shadow-inner">
                    <div class="absolute left-3 top-2.5 w-1.5 h-1.5 bg-white rounded-full"></div>
                    <div class="absolute right-3 top-2.5 w-1.5 h-1.5 bg-white rounded-full"></div>
                    <svg class="absolute bottom-2 w-5 h-2.5 text-white" viewBox="0 0 24 12" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M4 2 Q12 12 20 2"/></svg>
                </div>
                <div class="absolute bottom-0 right-0 w-8 h-8 bg-blue-100 rounded-full translate-x-3 translate-y-1 -z-10"></div>
                <div class="absolute bottom-2 right-2 w-4 h-4 bg-white rounded-full translate-x-4 translate-y-2 -z-10"></div>
            </div>
            <h1 class="text-3xl font-medium tracking-wide text-gray-800">你好呀，我是你的AI建模助手</h1>
        </div>

        <div id="drop-zone" class="relative w-full max-w-3xl file-drop-zone rounded-3xl">
            <textarea id="main-input" class="w-full h-56 bg-gray-100 hover:bg-gray-200/80 focus:bg-gray-100 rounded-2xl p-6 text-gray-800 placeholder-gray-400 resize-none focus:outline-none focus:ring-2 focus:ring-blue-100 transition-all duration-300 text-lg" placeholder="请描述您的任务..."></textarea>
            
            <div class="absolute bottom-5 left-5 flex items-center gap-2 flex-wrap">
                <input type="file" id="file-input" class="hidden" accept=".csv,.xlsx,.xls" multiple>
                <button onclick="document.getElementById('file-input').click()" class="p-2 rounded-full hover:bg-gray-300/50 text-gray-600 transition-colors" title="上传数据文件（最多5个，单个≤500MB）">
                    <i class="ph ph-plus text-2xl font-bold"></i>
                </button>
                <div id="file-badge" class="hidden flex items-center gap-1.5 bg-blue-50 text-blue-700 px-3 py-1 rounded-full text-xs font-medium border border-blue-100">
                    <i class="ph-fill ph-file-csv"></i>
                    <span id="file-name">--</span>
                    <span id="file-size" class="text-blue-400">--</span>
                </div>
            </div>
            
            <button onclick="App.transitionToWorkspace()" class="absolute bottom-5 right-5 p-2 rounded-full hover:bg-gray-300/50 text-gray-600 transition-colors">
                <i class="ph ph-arrow-up text-2xl font-bold"></i>
            </button>
        </div>

        <!-- 多文件列表 -->
        <div id="file-list" class="mt-4 flex flex-wrap gap-2 max-w-3xl w-full px-4 justify-center"></div>

        <div class="mt-6 text-xs text-gray-400">
            支持 CSV / XLSX / XLS 格式 · 最多 5 个文件 · 单个文件 ≤ 500MB
        </div>

        <!-- 欢迎页配置入口 -->
        <div class="mt-6 flex items-center gap-3">
            <button onclick="App.openLLMConfig()" class="flex items-center gap-2 px-4 py-2 bg-white border border-gray-200 rounded-xl text-sm text-gray-600 hover:bg-gray-50 hover:border-gray-300 transition-all">
                <i class="ph-fill ph-gear"></i>
                <span>配置 LLM</span>
                <span id="welcome-llm-status" class="w-2 h-2 rounded-full bg-gray-300"></span>
            </button>
            <span class="text-xs text-gray-400">可选：接入 OpenAI / Ollama / 本地大模型</span>
        </div>
    </div>

    <!-- 屏幕 2：左右双栏工作台 -->
    <div id="screen-2" class="absolute inset-0 flex p-6 gap-8 opacity-0 pointer-events-none transition-opacity duration-500 ease-in-out z-0 bg-white">
        
        <!-- 左侧栏：对话与历史 -->
        <div class="w-1/3 flex flex-col h-full relative">
            <!-- 顶部栏：阶段指示器 + 设置 -->
            <div class="flex items-center justify-between px-1 py-2 mb-1 border-b border-gray-100">
                <div class="flex items-center gap-3">
                    <div class="stage-indicator" id="stage-profile"><div class="dot"></div>数据画像</div>
                    <div class="stage-indicator" id="stage-intent"><div class="dot"></div>意图识别</div>
                    <div class="stage-indicator" id="stage-confirm"><div class="dot"></div>任务确认</div>
                    <div class="stage-indicator" id="stage-mode"><div class="dot"></div>模式选择</div>
                </div>
                <button onclick="App.openLLMConfig()" class="relative p-1.5 rounded-lg hover:bg-gray-100 text-gray-400 hover:text-gray-600 transition-colors" title="LLM 配置">
                    <i class="ph-fill ph-gear text-lg"></i>
                    <span id="llm-status-dot" class="absolute top-0.5 right-0.5 w-2 h-2 rounded-full bg-gray-300"></span>
                </button>
            </div>
            
            <div id="chat-container" class="flex-1 overflow-y-auto no-scrollbar flex flex-col gap-5 pb-40 pt-3">
                <div id="user-messages"></div>
                <div id="system-messages" class="flex flex-col gap-5"></div>
            </div>

            <!-- 底部输入框 -->
            <div class="absolute bottom-0 left-0 w-full bg-white pt-2 pb-4">
                <div class="bg-gray-100 rounded-3xl p-1.5 shadow-sm border border-gray-100 focus-within:bg-white focus-within:border-blue-200 focus-within:shadow-md transition-all">
                    <textarea id="bottom-input" class="w-full bg-transparent rounded-2xl pt-2.5 pb-1 px-4 text-gray-700 placeholder-gray-400 focus:outline-none resize-none text-sm leading-relaxed h-12" placeholder="输入更多指令..."></textarea>
                    <div class="flex items-center justify-between px-2 pb-1">
                        <button class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-200 text-gray-500 transition-colors">
                            <i class="ph ph-plus text-lg font-bold"></i>
                        </button>
                        <div class="flex items-center gap-2">
                            <div class="relative w-8 h-8">
                                <button id="btn-send" onclick="IntentFlow.handleUserSend()" class="btn-transition absolute inset-0 flex items-center justify-center rounded-lg bg-blue-500 hover:bg-blue-600 text-white shadow-sm active:scale-95">
                                    <i class="ph ph-arrow-up text-lg font-bold"></i>
                                </button>
                                <button id="btn-stop" onclick="App.onStopClicked()" class="btn-transition btn-hidden absolute inset-0 flex items-center justify-center rounded-lg bg-red-100 text-red-600 hover:bg-red-200 shadow-sm active:scale-95" title="强行停止">
                                    <i class="ph-fill ph-stop text-base"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧栏：工作区内容 -->
        <div class="w-2/3 flex flex-col h-full">
            <div class="flex justify-between gap-3 mb-5">
                <button onclick="switchTab('terminal')" class="flex-1 px-4 py-2.5 rounded-xl bg-[#8CB4FF] text-blue-950 text-xs font-bold shadow-sm transition-all tab-btn" data-tab="terminal">终端</button>
                <button onclick="switchTab('code')" class="flex-1 px-4 py-2.5 rounded-xl bg-gray-100 text-gray-500 text-xs font-bold hover:bg-gray-200 transition-all tab-btn" data-tab="code">模型代码</button>
                <button onclick="switchTab('results')" class="flex-1 px-4 py-2.5 rounded-xl bg-gray-100 text-gray-500 text-xs font-bold hover:bg-gray-200 transition-all tab-btn" data-tab="results">预测结果</button>
                <button onclick="switchTab('files')" class="flex-1 px-4 py-2.5 rounded-xl bg-gray-100 text-gray-500 text-xs font-bold hover:bg-gray-200 transition-all tab-btn" data-tab="files">文件</button>
            </div>

            <div id="main-display" class="flex-1 bg-[#121212] rounded-3xl w-full h-full shadow-2xl border border-gray-800 overflow-hidden flex flex-col relative">
                <!-- 终端面板 -->
                <div id="tab-panel-terminal" class="tab-panel h-full p-8 font-mono text-sm relative">
                    <div class="flex gap-1.5 absolute top-4 left-4">
                        <div class="w-3 h-3 rounded-full bg-red-500/20"></div>
                        <div class="w-3 h-3 rounded-full bg-yellow-500/20"></div>
                        <div class="w-3 h-3 rounded-full bg-green-500/20"></div>
                    </div>
                    <div id="terminal-content" class="text-gray-400 mt-4 leading-relaxed whitespace-pre h-full overflow-y-auto no-scrollbar">
                        <span class="text-blue-500/70">waiting for instructions...</span><span class="cursor"></span>
                    </div>
                </div>

                <!-- 代码面板 -->
                <div id="tab-panel-code" class="tab-panel hidden h-full bg-white rounded-3xl">
                    <div id="code-empty-state" class="h-full flex flex-col items-center justify-center text-gray-300">
                        <i class="ph ph-code text-5xl mb-4 opacity-40"></i>
                        <span class="text-sm opacity-60">模型代码将在建模过程中生成</span>
                    </div>
                    <div id="code-content-state" class="hidden h-full overflow-y-auto no-scrollbar"></div>
                </div>

                <!-- 预测结果面板 -->
                <div id="tab-panel-results" class="tab-panel hidden h-full bg-white rounded-3xl">
                    <div id="results-empty-state" class="h-full flex flex-col items-center justify-center text-gray-300">
                        <i class="ph ph-chart-bar text-5xl mb-4 opacity-40"></i>
                        <span class="text-sm opacity-60">预测结果将在模型训练完成后生成</span>
                    </div>
                    <div id="results-content-state" class="hidden h-full overflow-y-auto no-scrollbar p-6"></div>
                </div>

                <!-- 文件面板 -->
                <div id="tab-panel-files" class="tab-panel hidden h-full bg-white rounded-3xl">
                    <div id="files-empty-state" class="h-full flex flex-col items-center justify-center text-gray-300">
                        <i class="ph ph-folder text-5xl mb-4 opacity-40"></i>
                        <span class="text-sm opacity-60">交付文件将在建模过程中生成</span>
                    </div>
                    <div id="files-content-state" class="hidden h-full overflow-y-auto no-scrollbar p-6"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Core Modules -->
    <script src="js/core/state.js"></script>
    <script src="js/core/utils.js"></script>
    <!-- Shared Components -->
    <script src="js/shared/terminal.js"></script>
    <script src="js/shared/renderer.js"></script>
    <!-- Intent Clarification Module -->
    <script src="js/intent/profiler.js"></script>
    <script src="js/intent/agent.js"></script>
    <script src="js/intent/flow.js"></script>
    <!-- LLM Config Modal -->
    <div id="llm-config-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/30 backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6 m-4 animate-fade-in">
            <div class="flex items-center justify-between mb-5">
                <h3 class="text-lg font-bold text-gray-800">LLM 配置</h3>
                <button onclick="App.closeLLMConfig()" class="p-1 rounded-lg hover:bg-gray-100 text-gray-400">
                    <i class="ph ph-x text-lg"></i>
                </button>
            </div>

            <div class="space-y-4">
                <div class="flex items-center justify-between p-3 bg-blue-50 rounded-xl border border-blue-100">
                    <div class="flex items-center gap-2">
                        <i class="ph-fill ph-brain text-blue-500"></i>
                        <span class="text-sm font-medium text-blue-900">启用 LLM 驱动全流程建模</span>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="llm-enabled" class="sr-only peer" onchange="App.toggleLLM()">
                        <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-500"></div>
                    </label>
                </div>

                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1.5">部署方式</label>
                    <select id="llm-provider" onchange="App.onProviderChange()" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-blue-300 focus:ring-2 focus:ring-blue-100 transition-all">
                        <option value="openai">☁️ 云端 API（OpenAI 兼容格式）</option>
                        <option value="local-openai">💻 本地部署（OpenAI 兼容格式，如 LM Studio / vLLM）</option>
                        <option value="ollama">🦙 本地 Ollama</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1.5">Base URL</label>
                    <input type="text" id="llm-base-url" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-blue-300 focus:ring-2 focus:ring-blue-100 transition-all" placeholder="https://api.openai.com/v1">
                </div>

                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1.5">API Key <span class="text-gray-300 font-normal">（本地部署可留空）</span></label>
                    <input type="password" id="llm-api-key" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-blue-300 focus:ring-2 focus:ring-blue-100 transition-all" placeholder="sk-...">
                </div>

                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1.5">Model</label>
                    <input type="text" id="llm-model" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-blue-300 focus:ring-2 focus:ring-blue-100 transition-all" placeholder="gpt-4o-mini">
                </div>

                <div id="provider-hint" class="bg-gray-50 border border-gray-100 rounded-xl p-3 text-xs text-gray-600">
                    <div class="flex items-start gap-2">
                        <i class="ph-fill ph-info text-gray-400 mt-0.5"></i>
                        <div id="provider-hint-text">支持 OpenAI、Azure、Moonshot 等所有兼容 OpenAI 格式的云端 API。</div>
                    </div>
                </div>
            </div>

            <div class="flex gap-3 mt-6">
                <button onclick="App.saveLLMConfig()" class="flex-1 py-2.5 bg-[#8CB4FF] text-blue-950 rounded-xl text-sm font-bold shadow-sm hover:bg-blue-400 transition-all active:scale-[0.98]">
                    保存配置
                </button>
                <button onclick="App.testLLMConfig()" class="px-4 py-2.5 bg-white border border-gray-200 text-gray-600 rounded-xl text-sm font-medium hover:bg-gray-50 transition-all">
                    测试连接
                </button>
            </div>
        </div>
    </div>

    <!-- Mode Interface -->
    <script src="js/modeInterface.js"></script>
    <!-- Fast Mode -->
    <script src="js/shared/codeEditor.js"></script>
    <script src="js/fast/mockData.js"></script>
    <script src="js/fast/engine.js?v=4"></script>
    <script src="js/fast/ui.js?v=4"></script>
    <!-- Depth Mode -->
    <script src="js/depth/mockData.js"></script>
    <script src="js/depth/engine.js"></script>
    <script src="js/depth/ui.js"></script>
    <!-- App Entry -->
    <script src="js/app.js"></script>
</body>
</html>
